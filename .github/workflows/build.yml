name: Build and Deploy Resume

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. Build and Deploy WebAssembly to GitHub Pages
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.50'
          actions-cache-folder: 'emsdk-cache'

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: 'all_os'
          target: 'wasm'
          arch: 'wasm_singlethread'
          dir: '${{ github.workspace }}/qt'
          cached: ${{ steps.cache-qt.outputs.cache-hit }}

      - name: Build WebAssembly App
        run: |
          mkdir build_wasm
          cd build_wasm
          qmake ..
          make -j$(nproc)

      - name: Prepare Deployment Directory
        run: |
          mkdir dist
          # Copy WASM build artifacts
          cp build_wasm/AlirezaReisiResume.html dist/index.html
          cp build_wasm/AlirezaReisiResume.js dist/
          cp build_wasm/AlirezaReisiResume.wasm dist/
          cp build_wasm/qtloader.js dist/
          # Copy the PDF CV so it's downloadable from the site
          cp Alireza_Reisi_CV_v3.pdf dist/
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_exclude_dotfiles: true

  # 2. Build Windows Desktop Version
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          dir: 'D:/Qt'

      - name: Build Windows Executable
        shell: cmd
        run: |
          mkdir build_win
          cd build_win
          qmake ..
          nmake

      - name: Package Windows Build
        shell: cmd
        run: |
          mkdir release_win
          copy build_win\release\AlirezaReisiResume.exe release_win\
          copy Alireza_Reisi_CV_v3.pdf release_win\
          windeployqt --qmldir qml release_win\AlirezaReisiResume.exe

      - name: Archive Windows Release
        shell: pwsh
        run: |
          Compress-Archive -Path release_win/* -DestinationPath AlirezaReisiResume-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlirezaReisiResume-Windows
          path: AlirezaReisiResume-Windows.zip

  # 3. Build Linux Desktop Version
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev libxkbcommon-x11-0 libegl1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          target: 'desktop'
          dir: '${{ github.workspace }}/qt'

      - name: Build Linux Executable
        run: |
          mkdir build_linux
          cd build_linux
          qmake ..
          make -j$(nproc)

      - name: Package Linux Build
        run: |
          mkdir release_linux
          cp build_linux/AlirezaReisiResume release_linux/
          cp Alireza_Reisi_CV_v3.pdf release_linux/

      - name: Archive Linux Release
        run: |
          tar -czvf AlirezaReisiResume-Linux.tar.gz -C release_linux .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlirezaReisiResume-Linux
          path: AlirezaReisiResume-Linux.tar.gz

  # 4. Publish Release on GitHub Releases
  publish-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    permissions:
      contents: write
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Automated compilation of the resume apps from the main branch."
          draft: false
          prerelease: false
          files: |
            AlirezaReisiResume-Windows/AlirezaReisiResume-Windows.zip
            AlirezaReisiResume-Linux/AlirezaReisiResume-Linux.tar.gz
